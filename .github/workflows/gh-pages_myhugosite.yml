# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - myhugosite

on:
  push:
    branches:
      - gh-pages
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to registry
      uses: docker/login-action@v1
      with:
        registry: https://mcr.microsoft.com/
        username: ${{ secrets.AzureAppService_ContainerUsername_c3478585f56546fcb039444e998f0b22 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_10c6bbe10f724ff98a552f525e298017 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: mcr.microsoft.com/${{ secrets.AzureAppService_ContainerUsername_c3478585f56546fcb039444e998f0b22 }}/appsvc/staticsite:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'myhugosite'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_5c6cf98360cc4fe78eb29ee2526637b9 }}
        images: 'mcr.microsoft.com/${{ secrets.AzureAppService_ContainerUsername_c3478585f56546fcb039444e998f0b22 }}/appsvc/staticsite:${{ github.sha }}'